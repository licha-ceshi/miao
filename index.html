<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵宇宙 - 猫咪卡片展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            color: #f0f0f0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 0 1rem;
        }

        .cat-card {
            background: linear-gradient(145deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4);
        }

        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .cat-image {
            width: 100%;
            height: 200px;
            background: #fff;
            border-radius: 15px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .cat-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .cat-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .cat-age {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .cat-personality {
            color: #34495e;
            line-height: 1.6;
            font-size: 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
        }

        .cat-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .cat-emoji:nth-child(1) {
            top: 20px;
            right: 20px;
            animation-delay: 0s;
        }

        .cat-emoji:nth-child(2) {
            bottom: 20px;
            left: 20px;
            animation-delay: 1s;
        }

        .cat-emoji:nth-child(3) {
            top: 50%;
            right: 10px;
            animation-delay: 2s;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .cats-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .cat-card {
                margin: 0 0.5rem;
            }
        }

        .loading {
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
            margin: 2rem 0;
        }

        /* 文件上传样式 */
        .upload-section {
            text-align: center;
            margin: 2rem 0;
        }

        .upload-label {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .upload-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* 轮播图样式 */
        .carousel-section {
            margin: 3rem 0;
            display: flex;
            justify-content: center;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .carousel-slide {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-item {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(transparent 70%, rgba(0, 0, 0, 0.7));
        }

        .carousel-caption {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-btn:hover {
            background: white;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: white;
            transform: scale(1.2);
        }

        .carousel-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .carousel-container {
                height: 300px;
                margin: 0 1rem;
            }

            .carousel-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .prev-btn {
                left: 10px;
            }

            .next-btn {
                right: 10px;
            }

            .carousel-caption {
                font-size: 1rem;
                bottom: 15px;
                left: 15px;
            }

            .carousel-counter {
                top: 15px;
                right: 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐱 喵宇宙 🐱</h1>
            <p>欢迎来到神奇的猫咪世界，每只猫咪都有自己独特的魅力！</p>
        </div>

        <!-- 文件上传区域 -->
        <div class="upload-section">
            <label for="imageUpload" class="upload-label">
                📁 上传猫咪照片（可多选）
            </label>
            <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
        </div>

        <!-- 轮播图容器 -->
        <div class="carousel-section">
            <div class="carousel-container">
                <div class="carousel-slide" id="carouselSlide">
                    <!-- 轮播图片将通过JavaScript动态生成 -->
                </div>
                <button class="carousel-btn prev-btn" id="prevBtn">‹</button>
                <button class="carousel-btn next-btn" id="nextBtn">›</button>
                <div class="carousel-indicators" id="carouselIndicators">
                    <!-- 指示器将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>

        <div class="cats-grid" id="catsGrid">
            <!-- 猫咪卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 轮播图功能
        class Carousel {
            constructor() {
                this.currentIndex = 0;
                this.images = [];
                this.slideElement = document.getElementById('carouselSlide');
                this.indicatorsElement = document.getElementById('carouselIndicators');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.counterElement = this.createCounter();
                this.intervalId = null;
                this.intervalTime = 3000; // 3秒自动切换

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.addDefaultImages();
                this.render();
                this.startAutoPlay();
            }

            setupEventListeners() {
                this.prevBtn.addEventListener('click', () => this.prev());
                this.nextBtn.addEventListener('click', () => this.next());

                // 鼠标悬停时暂停自动播放
                const carousel = document.querySelector('.carousel-container');
                carousel.addEventListener('mouseenter', () => this.pauseAutoPlay());
                carousel.addEventListener('mouseleave', () => this.startAutoPlay());

                // 触摸支持
                let touchStartX = 0;
                carousel.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                });

                carousel.addEventListener('touchend', (e) => {
                    const touchEndX = e.changedTouches[0].clientX;
                    const diff = touchStartX - touchEndX;

                    if (Math.abs(diff) > 50) {
                        if (diff > 0) {
                            this.next();
                        } else {
                            this.prev();
                        }
                    }
                });
            }

            createCounter() {
                const counter = document.createElement('div');
                counter.className = 'carousel-counter';
                document.querySelector('.carousel-container').appendChild(counter);
                return counter;
            }

            addDefaultImages() {
                // 添加一些默认的猫咪图片
                const defaultImages = [
                    {
                        src: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=800&h=400&fit=crop',
                        caption: '可爱的小橘猫'
                    },
                    {
                        src: 'https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=800&h=400&fit=crop',
                        caption: '温顺的雪球'
                    },
                    {
                        src: 'https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=800&h=400&fit=crop',
                        caption: '神秘的煤球'
                    }
                ];

                this.images = [...defaultImages];
            }

            render() {
                this.slideElement.innerHTML = '';
                this.indicatorsElement.innerHTML = '';

                this.images.forEach((image, index) => {
                    // 创建轮播项
                    const slideItem = document.createElement('div');
                    slideItem.className = 'carousel-item';
                    slideItem.innerHTML = `
                        <img src="${image.src}" alt="${image.caption || '猫咪图片'}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"800\" height=\"400\" viewBox=\"0 0 800 400\"><rect width=\"800\" height=\"400\" fill=\"%23f0f0f0\"/><text x=\"50%25\" y=\"50%25\" text-anchor=\"middle\" dy=\".3em\" font-size=\"60\">🐱</text></svg>'">
                        ${image.caption ? `<div class="carousel-caption">${image.caption}</div>` : ''}
                    `;
                    this.slideElement.appendChild(slideItem);

                    // 创建指示器
                    const indicator = document.createElement('div');
                    indicator.className = 'indicator';
                    indicator.addEventListener('click', () => this.goToIndex(index));
                    this.indicatorsElement.appendChild(indicator);
                });

                this.updateIndicators();
                this.updateCounter();
                this.updateSlidePosition();
            }

            updateIndicators() {
                const indicators = document.querySelectorAll('.indicator');
                indicators.forEach((indicator, index) => {
                    if (index === this.currentIndex) {
                        indicator.classList.add('active');
                    } else {
                        indicator.classList.remove('active');
                    }
                });
            }

            updateCounter() {
                this.counterElement.textContent = `${this.currentIndex + 1}/${this.images.length}`;
            }

            updateSlidePosition() {
                this.slideElement.style.transform = `translateX(-${this.currentIndex * 100}%)`;
            }

            next() {
                this.currentIndex = (this.currentIndex + 1) % this.images.length;
                this.updateIndicators();
                this.updateCounter();
                this.updateSlidePosition();
            }

            prev() {
                this.currentIndex = (this.currentIndex - 1 + this.images.length) % this.images.length;
                this.updateIndicators();
                this.updateCounter();
                this.updateSlidePosition();
            }

            goToIndex(index) {
                this.currentIndex = index;
                this.updateIndicators();
                this.updateCounter();
                this.updateSlidePosition();
            }

            startAutoPlay() {
                this.pauseAutoPlay();
                this.intervalId = setInterval(() => {
                    this.next();
                }, this.intervalTime);
            }

            pauseAutoPlay() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
            }

            addImages(newImages) {
                this.images.push(...newImages);
                this.render();
                this.startAutoPlay();
            }
        }

        // 初始化轮播图
        let carousel;

        // 猫咪数据
        const catsData = [
            {
                name: "小橘",
                age: "2岁",
                personality: "活泼好动，喜欢追逐光点和毛线球。每天早上都会准时叫主人起床，是个贴心的小闹钟。",
                image: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)"
            },
            {
                name: "雪球",
                age: "1岁",
                personality: "温顺可爱，最喜欢在阳光下打盹。性格安静，喜欢被抚摸，是治愈系的小天使。",
                image: "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #a8edea 0%, #fed6e3 100%)"
            },
            {
                name: "煤球",
                age: "3岁",
                personality: "神秘高冷，总是独自思考猫生。虽然看起来冷漠，但其实很关心家人，会在夜里默默守护。",
                image: "https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #d299c2 0%, #fef9d7 100%)"
            },
            {
                name: "花花",
                age: "4岁",
                personality: "爱美的公主，每天都要梳理自己的毛发。喜欢照镜子，对自己的颜值非常自信。",
                image: "https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #ffecd2 0%, #fcb69f 100%)"
            },
            {
                name: "胖虎",
                age: "5岁",
                personality: "贪吃的小胖子，最大的爱好就是吃和睡。虽然体型圆润，但依然灵活可爱。",
                image: "https://images.unsplash.com/photo-1560114928-40f1f1eb26a0?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #ffd89b 0%, #19547b 100%)"
            },
            {
                name: "咪咪",
                age: "6个月",
                personality: "好奇宝宝，对世界充满探索欲。喜欢爬高走低，总是能发现新奇有趣的东西。",
                image: "https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e?w=400&h=300&fit=crop",
                bgColor: "linear-gradient(145deg, #667eea 0%, #764ba2 100%)"
            }
        ];

        // 生成猫咪卡片
        function createCatCards() {
            const catsGrid = document.getElementById('catsGrid');

            catsData.forEach((cat, index) => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                card.style.background = cat.bgColor;

                card.innerHTML = `
                    <div class="cat-image">
                        <img src="${cat.image}" alt="${cat.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"300\" viewBox=\"0 0 400 300\"><rect width=\"400\" height=\"300\" fill=\"%23f0f0f0\"/><text x=\"50%25\" y=\"50%25\" text-anchor=\"middle\" dy=\".3em\" font-size=\"60\">🐱</text></svg>'">
                        <div class="cat-emoji">😸</div>
                        <div class="cat-emoji">🐾</div>
                        <div class="cat-emoji">🎀</div>
                    </div>
                    <h2 class="cat-name">${cat.name}</h2>
                    <div class="cat-age">${cat.age}</div>
                    <p class="cat-personality">${cat.personality}</p>
                `;

                catsGrid.appendChild(card);
            });
        }

        // 文件上传功能
        function setupFileUpload() {
            const fileInput = document.getElementById('imageUpload');

            fileInput.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                const newImages = [];

                files.forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            newImages.push({
                                src: e.target.result,
                                caption: file.name.split('.')[0] // 使用文件名作为标题
                            });

                            // 当所有图片都加载完成后添加到轮播图
                            if (newImages.length === files.length) {
                                carousel.addImages(newImages);
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                });

                // 清空文件输入，允许重复选择同一文件
                e.target.value = '';
            });
        }

        // 页面加载完成后生成卡片
        document.addEventListener('DOMContentLoaded', function() {
            carousel = new Carousel();
            createCatCards();
            setupFileUpload();
        });

        // 添加一些交互效果
        document.addEventListener('mousemove', function(e) {
            const cards = document.querySelectorAll('.cat-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;

                if (Math.abs(rotateX) < 15 && Math.abs(rotateY) < 15) {
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
                }
            });
        });

        document.addEventListener('mouseleave', function() {
            const cards = document.querySelectorAll('.cat-card');
            cards.forEach(card => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            });
        });
    </script>
</body>
</html>
